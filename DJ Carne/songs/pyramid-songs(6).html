<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пирамида треков</title>
<style>
  :root{
    --ink:#0a0a0a;
    --ink-dim:#6b6b6b;
    --line:#0a0a0a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family: 'Poppins','Segoe UI', Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 16px 90px;
  }
  h1{
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 800;
    margin: 0 0 22px;
    color:#0a0a0a;
    letter-spacing: -0.01em;
    text-align:center;
  }

  button{
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor:pointer;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: #fff;
    padding: 13px 24px;
    border-radius: 14px;
    transition: transform 0.12s, background 0.12s, color 0.12s;
  }
  button:hover{ transform: translateY(-2px); background:#fff; color: var(--ink); }
  button:active{ transform: translateY(0); }

  #app{ width:100%; max-width: 760px; }

  /* ---- queue (current card) ---- */
  .queue-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom: 28px;
    min-height: 96px;
  }
  .queue-label{
    font-size: 12px;
    font-weight:700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 12px;
  }
  .empty-msg{
    font-size: 15px;
    color: var(--ink-dim);
    font-style: italic;
    font-weight:600;
  }

  /* ---- card ---- */
  .card{
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 16px;
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    cursor: grab;
    user-select:none;
    animation: pop 0.32s ease-out;
    text-align:center;
    display:flex;
    flex-direction:column;
    min-width: 150px;
    max-width: 210px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  .card.dragging{ opacity:0.3; }
  @keyframes pop{
    from{ transform: translateY(-14px) scale(0.9) rotate(-2deg); opacity:0;}
    to{ transform: translateY(0) scale(1) rotate(0deg); opacity:1;}
  }

  .card-inner{
    display:flex;
    align-items:center;
    gap: 8px;
    justify-content:center;
  }
  .card-inner span{ overflow-wrap:anywhere; }

  .play-btn{
    flex:0 0 auto;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    background: #fff;
    color: var(--ink);
    font-size: 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .play-btn:hover{ background: var(--ink); color:#fff; }

  .progress-row{
    display:none;
    width:100%;
    align-items:center;
    gap: 8px;
    margin-top: 9px;
  }
  .progress-row.show{ display:flex; }
  .progress-row input[type="range"].seek{
    flex: 1 1 auto;
    height: 5px;
    -webkit-appearance: none;
    appearance: none;
    background: #ddd;
    border-radius: 3px;
    outline: none;
    cursor:pointer;
    touch-action: none;
  }
  .progress-row input[type="range"].seek::-webkit-slider-thumb{
    -webkit-appearance: none;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--ink);
    cursor:pointer;
    margin-top: -1px;
  }
  .progress-row input[type="range"].seek::-moz-range-thumb{
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--ink);
    border:none;
    cursor:pointer;
  }
  .time-text{
    flex: 0 0 auto;
    font-size: 9.5px;
    color: var(--ink-dim);
    white-space:nowrap;
    font-weight:700;
  }

  /* ---- Pyramid: stacked tiers, widths grow toward the base ---- */
  .pyramid{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    gap: 0;
  }
  .level{
    position:relative;
    box-sizing:border-box;
    border: 2.5px solid var(--ink);
    border-top-width: 0;
    padding: 26px 16px 14px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-content:flex-start;
    gap: 8px;
    min-height: 64px;
    transition: filter 0.15s;
  }
  .level:first-child{
    border-top-width: 2.5px;
    border-radius: 18px 18px 0 0;
  }
  .level:last-child{
    border-radius: 0 0 18px 18px;
  }
  .level.dragover{ filter: brightness(0.94); }
  .level-name{
    position:absolute;
    top:6px;
    left:14px;
    font-size: 11px;
    font-weight:800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .level-cap{
    position:absolute;
    top:5px;
    right:12px;
    font-size: 11px;
    font-weight:700;
    color: var(--ink);
    background: rgba(255,255,255,0.85);
    border: 1.3px solid var(--ink);
    padding: 2px 9px;
    border-radius: 999px;
  }

  /* ---- trash zone ---- */
  .trash-zone{
    width:100%;
    border: 2.5px dashed var(--ink);
    border-radius: 16px;
    padding: 14px 16px;
    margin-top: 6px;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    justify-content:center;
    gap: 8px;
    min-height: 70px;
    position:relative;
    background: #fafafa;
    transition: background 0.15s;
  }
  .trash-zone.dragover{ background:#eee; }
  .trash-label{
    position:absolute;
    top:-12px;
    left:14px;
    background:#fff;
    padding: 0 8px;
    font-size: 11px;
    font-weight:800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .trash-zone .card{
    font-size: 12px;
    padding: 7px 12px;
    opacity: 0.6;
  }

  #resetBtn{ margin-top: 30px; background: #fff; color: var(--ink); }
  #resetBtn:hover{ background: var(--ink); color:#fff; }
  .reset-wrap{ display:flex; justify-content:center; }

  @media (max-width: 480px){
    .level .card{ min-width: 110px; max-width: 150px; font-size: 13px; padding: 10px 14px; }
  }
</style>
</head>
<body>

  <h1>Пирамида треков</h1>

  <div id="app">
    <div class="queue-zone">
      <div class="queue-label">Текущий трек</div>
      <div id="queueHolder"></div>
    </div>

    <div class="pyramid" id="pyramid"></div>

    <div class="trash-zone" id="trashZone">
      <div class="trash-label">🗑 не в топе</div>
    </div>

    <div class="reset-wrap">
      <button id="resetBtn">Начать заново</button>
    </div>
  </div>

<script>
(function(){
  const queueHolder = document.getElementById('queueHolder');
  const pyramidEl = document.getElementById('pyramid');
  const resetBtn = document.getElementById('resetBtn');
  const trashZone = document.getElementById('trashZone');

  const SONGS = [
    'Майонез',
    'Самокатер',
    'Не Квач',
    'Фляга',
    'Фляга фонк',
    'Скотина',
    'Поток воспоминаний(Воздух)',
    'Гундарки(Воздух 2)',
    'Диджей Путария диз',
    'Минск сити малл',
    'Она',
    'Майонез фит',
    'Постербойность эпохи',
    'Конфетный бит',
    'Декольте',
    'Гамак',
    'Сан-Паулу',
    'Кобаченко обдурил тебя',
    'ЧЕКУШКАиВЕНЕЦ',
    'Тру Скотина',
    'Развязка',
    'Присон Бёрд',
    'Дядя Стёпа найс жёпа'
  ];

  // вместимость каждого уровня (не накопительно): top1=1, top3=+2, top5=+2, top10=+5, top20=+10 => всего 20
  const CAPACITY = [1, 2, 2, 5, 10];
  const LABELS = ['ТОП 1', 'ТОП 3', 'ТОП 5', 'ТОП 10', 'ТОП 20'];
  const TIER_COLORS = [
    'rgba(255,196,40,0.32)',
    'rgba(255,140,66,0.28)',
    'rgba(255,90,150,0.22)',
    'rgba(186,90,255,0.18)',
    'rgba(90,110,255,0.14)'
  ];
  const AUDIO_EXTS = ['mp3', 'wav', 'ogg', 'm4a', 'flac', 'aac'];

  let queue = [];
  let currentCard = null;
  let idCounter = 0;
  let levels = [];

  // ================= audio: ищем файл "<номер>.<расширение>" рядом с html =================
  let currentAudio = new Audio();
  let activeNum = null;
  let activeBtn = null;
  let activeRange = null;
  let activeTimeText = null;
  let activeProgressRow = null;
  let seeking = false;

  function formatTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  currentAudio.addEventListener('timeupdate', () => {
    if(seeking || !activeRange || !currentAudio.duration) return;
    activeRange.value = String((currentAudio.currentTime / currentAudio.duration) * 1000);
    activeTimeText.textContent = formatTime(currentAudio.currentTime) + ' / ' + formatTime(currentAudio.duration);
  });
  currentAudio.addEventListener('loadedmetadata', () => {
    if(activeTimeText) activeTimeText.textContent = '0:00 / ' + formatTime(currentAudio.duration);
  });
  currentAudio.addEventListener('ended', () => {
    if(activeBtn) activeBtn.textContent = '▶';
  });

  function addPlayButton(card, num){
    const inner = card.querySelector('.card-inner');
    if(!inner || inner.querySelector('.play-btn')) return;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'play-btn';
    btn.textContent = '▶';
    inner.insertBefore(btn, inner.firstChild);

    const progressRow = document.createElement('div');
    progressRow.className = 'progress-row';
    const range = document.createElement('input');
    range.type = 'range';
    range.className = 'seek';
    range.min = '0';
    range.max = '1000';
    range.value = '0';
    const timeText = document.createElement('span');
    timeText.className = 'time-text';
    timeText.textContent = '0:00 / 0:00';
    progressRow.appendChild(range);
    progressRow.appendChild(timeText);
    card.appendChild(progressRow);

    // ФИКС бага: пока трогаем кнопку или слайдер — у карточки временно
    // отключается drag, чтобы браузер не пытался "перетащить" её как ссылку.
    const disableDrag = () => { card.draggable = false; };
    const enableDrag = () => { card.draggable = true; };

    [btn, range].forEach(el => {
      el.addEventListener('pointerdown', disableDrag);
      el.addEventListener('mousedown', disableDrag);
      el.addEventListener('touchstart', disableDrag, { passive: true });
    });
    ['pointerup','pointercancel','mouseup','touchend','touchcancel'].forEach(evt => {
      window.addEventListener(evt, enableDrag);
    });
    [btn, progressRow].forEach(el => {
      el.addEventListener('mousedown', e => e.stopPropagation());
      el.addEventListener('dragstart', e => e.preventDefault());
    });

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      handlePlayClick(num, btn, range, timeText, progressRow);
    });

    range.addEventListener('input', () => {
      if(activeNum !== num || !currentAudio.duration) return;
      seeking = true;
      currentAudio.currentTime = (parseFloat(range.value) / 1000) * currentAudio.duration;
      timeText.textContent = formatTime(currentAudio.currentTime) + ' / ' + formatTime(currentAudio.duration);
    });
    range.addEventListener('change', () => { seeking = false; });

    // если этот трек уже активен (карточку просто переместили), переподключаем ссылки
    if(activeNum === num){
      activeBtn = btn;
      activeRange = range;
      activeTimeText = timeText;
      activeProgressRow = progressRow;
      progressRow.classList.add('show');
      btn.textContent = currentAudio.paused ? '▶' : '⏸';
      if(currentAudio.duration){
        range.value = String((currentAudio.currentTime / currentAudio.duration) * 1000);
        timeText.textContent = formatTime(currentAudio.currentTime) + ' / ' + formatTime(currentAudio.duration);
      }
    }
  }

  function handlePlayClick(num, btn, range, timeText, progressRow){
    if(activeNum === num){
      if(currentAudio.paused){
        currentAudio.play().catch(() => {});
        btn.textContent = '⏸';
      } else {
        currentAudio.pause();
        btn.textContent = '▶';
      }
      return;
    }
    if(activeBtn) activeBtn.textContent = '▶';
    if(activeProgressRow) activeProgressRow.classList.remove('show');

    activeNum = num;
    activeBtn = btn;
    activeRange = range;
    activeTimeText = timeText;
    activeProgressRow = progressRow;

    progressRow.classList.add('show');
    range.value = '0';
    timeText.textContent = '0:00 / 0:00';
    btn.textContent = '⏸';

    tryExtensions(num, 0, btn);
  }

  function tryExtensions(num, extIdx, btn){
    if(extIdx >= AUDIO_EXTS.length){
      btn.textContent = '▶';
      if(activeBtn === btn){ activeNum = null; activeBtn = null; }
      alert('Файл с номером ' + num + ' не найден в папке рядом с html (попробуй назвать его "' + num + '.mp3").');
      return;
    }
    const url = num + '.' + AUDIO_EXTS[extIdx];
    currentAudio.src = url;
    currentAudio.currentTime = 0;
    currentAudio.play().then(() => {
      // успех
    }).catch(() => {
      tryExtensions(num, extIdx + 1, btn);
    });
  }

  // ================= pyramid building =================
  function start(){
    queue = SONGS.map((w, i) => ({ id: 'w'+(idCounter++), text: w, num: i+1 }));
    buildPyramid();
    nextCard();
  }

  resetBtn.addEventListener('click', () => {
    queueHolder.innerHTML = '';
    pyramidEl.innerHTML = '';
    trashZone.querySelectorAll('.card').forEach(c => c.remove());
    currentCard = null;
    start();
  });

  function buildPyramid(){
    pyramidEl.innerHTML = '';
    levels = [];
    // ширины подобраны так, чтобы каждый уровень гарантированно вмещал свою вместимость карточек
    const WIDTHS = [34, 52, 68, 86, 100];
    CAPACITY.forEach((cap, idx) => {
      const level = document.createElement('div');
      level.className = 'level';
      level.dataset.tier = String(idx);
      level.dataset.cap = String(cap);
      level.style.width = WIDTHS[idx] + '%';
      level.style.background = TIER_COLORS[idx];

      const nameLabel = document.createElement('div');
      nameLabel.className = 'level-name';
      nameLabel.textContent = LABELS[idx];
      level.appendChild(nameLabel);

      const capLabel = document.createElement('div');
      capLabel.className = 'level-cap';
      capLabel.textContent = '0/' + cap;
      level.appendChild(capLabel);

      attachLevelEvents(level, cap);
      pyramidEl.appendChild(level);
      levels.push(level);
    });
  }

  function refreshCapLabel(level){
    const cap = parseInt(level.dataset.cap, 10);
    const count = level.querySelectorAll('.card').length;
    const label = level.querySelector('.level-cap');
    label.textContent = count + '/' + cap;
  }

  function refreshAllCaps(){
    levels.forEach(refreshCapLabel);
  }

  function nextCard(){
    queueHolder.innerHTML = '';
    if(queue.length === 0){
      currentCard = null;
      const msg = document.createElement('div');
      msg.className = 'empty-msg';
      msg.textContent = 'Все треки распределены 🎉';
      queueHolder.appendChild(msg);
      return;
    }
    currentCard = queue.shift();
    queueHolder.appendChild(makeCardEl(currentCard));
  }

  function makeCardEl(data){
    const card = document.createElement('div');
    card.className = 'card';
    card.draggable = true;
    card.dataset.id = data.id;
    card.dataset.text = data.text;
    card.dataset.num = data.num || '';

    const inner = document.createElement('div');
    inner.className = 'card-inner';
    const label = document.createElement('span');
    label.textContent = (data.num ? (data.num + '. ') : '') + data.text;
    inner.appendChild(label);
    card.appendChild(inner);

    if(data.num){
      addPlayButton(card, data.num);
    }

    card.addEventListener('dragstart', (e) => {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', JSON.stringify({ id: data.id, text: data.text, num: data.num }));
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));

    return card;
  }

  function placeCard(payload, container){
    const existing = document.querySelector('[data-id="'+payload.id+'"]');
    if(existing) existing.remove();
    const cardEl = makeCardEl(payload);
    container.appendChild(cardEl);
    refreshAllCaps();
    if(currentCard && currentCard.id === payload.id){
      nextCard();
    }
  }

  function attachLevelEvents(level, cap){
    level.addEventListener('dragover', (e) => {
      e.preventDefault();
      const count = level.querySelectorAll('.card').length;
      if(count < cap) level.classList.add('dragover');
    });
    level.addEventListener('dragleave', () => level.classList.remove('dragover'));
    level.addEventListener('drop', (e) => {
      e.preventDefault();
      level.classList.remove('dragover');
      let payload;
      try{ payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch(err){ return; }
      if(!payload) return;
      const count = level.querySelectorAll('.card').length;
      if(count >= cap) return; // переполнено
      placeCard(payload, level);
    });
  }

  // ---- мусорка: неограниченная вместимость ----
  trashZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    trashZone.classList.add('dragover');
  });
  trashZone.addEventListener('dragleave', () => trashZone.classList.remove('dragover'));
  trashZone.addEventListener('drop', (e) => {
    e.preventDefault();
    trashZone.classList.remove('dragover');
    let payload;
    try{ payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch(err){ return; }
    if(!payload) return;
    placeCard(payload, trashZone);
  });

  // ---- возврат карточки в очередь (если очередь пуста) ----
  queueHolder.addEventListener('dragover', (e) => e.preventDefault());
  queueHolder.addEventListener('drop', (e) => {
    e.preventDefault();
    let payload;
    try{ payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch(err){ return; }
    if(!payload) return;
    if(currentCard) return;
    const existing = document.querySelector('[data-id="'+payload.id+'"]');
    if(existing) existing.remove();
    currentCard = { id: payload.id, text: payload.text, num: payload.num };
    queueHolder.innerHTML = '';
    queueHolder.appendChild(makeCardEl(currentCard));
    refreshAllCaps();
  });

  start();

})();
</script>
</body>
</html>
